version: "3.8"

services:

  app:
    build: .
    container_name: fleetflow_app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/fleetflow2?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: AyoubHadi120
    networks:
      - app_network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - "3308:3306"   # host:container
    environment:
      MYSQL_DATABASE: fleetflow2
      MYSQL_ROOT_PASSWORD: AyoubHadi120
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

networks:
  app_network:

volumes:
  db_data: