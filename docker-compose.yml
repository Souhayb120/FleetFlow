
version: "3.7"

services:
  app:
    build: .
    container_name: fleetFlow_app
    depends_on:
      - db
    ports:
      - 8080:8080
    environment:

      SPRING_DATASOURCE_URL:  jdbc:mysql://mysql_db:3306/fleetflow2
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:  1234
    networks:
      - app_network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - 3306:3306
    networks:
      - app_network
    environment:
      MYSQL_DATABASE: fleetflow2
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql
networks:
  app_network:
volumes:
  db_data: